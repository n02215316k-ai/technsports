services:
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env.production}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in .env.production}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: technsports
      POSTGRES_USER: technsports
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U technsports -d technsports"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    image: technsports-api:prod
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://technsports:${POSTGRES_PASSWORD}@postgres:5432/technsports
      REDIS_URL: redis://redis:6379
      PORT: 4000
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      PERSISTENCE_MODE: postgres
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?Set PASSWORD_PEPPER in .env.production}
      COOKIE_SECURE: "true"
      WEB_URL: https://${DOMAIN}
      CORS_ORIGINS: https://${DOMAIN}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST in .env.production}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:?Set EMAIL_FROM in .env.production}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: technsports-web:prod
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api/v1
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api/v1
    depends_on:
      api:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  uploads_data:
